[[note]]
sentiment = 0.5
text = "Cleanest articulation of cqs's hardest problem: 'It's easy to index a codebase, it is not easy to keep it indexed between turns.' Other tools dodge this — IDEs by being the editor (continuous time, editor consumer), Sourcegraph by ignoring the working tree (only commit state), Aider by not indexing. cqs's local-persistent-index-with-CLI shape is right for agent consumers but inherits the freshness problem. Closing the gap (#1182) is positioning lever — freshness as third top-line property alongside semantic search + call graphs. Pitch line: 'the only code search tool that tells you when it's stale.'"
mentions = [
    "watch",
    "#1182",
    "positioning",
    "freshness",
]

