<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cqs serve</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <span class="brand">cqs serve</span>
    <span id="stats-badge" class="stats">…</span>
    <span class="spacer"></span>
    <div class="view-toggle" role="group" aria-label="view mode">
      <button id="view-2d" class="active" type="button" title="2D Cytoscape (default)">2D</button>
      <button id="view-3d" type="button" title="3D force-directed (Three.js)">3D</button>
      <button id="view-cluster" type="button" title="Embedding cluster — chunks placed by UMAP semantic similarity">cluster</button>
    </div>
    <div id="cluster-controls" class="cluster-controls" style="display:none;" aria-label="cluster controls">
      <div id="cluster-color" class="btn-group" role="group" aria-label="color by">
        <span class="btn-group-label">color</span>
        <button type="button" data-color="type" class="active">type</button>
        <button type="button" data-color="language">language</button>
      </div>
    </div>
    <div id="hierarchy-controls" class="hierarchy-controls" style="display:none;" aria-label="hierarchy controls">
      <div id="hierarchy-direction" class="btn-group" role="group" aria-label="direction">
        <button type="button" data-direction="callers" title="show transitive callers (BFS up)">↑ callers</button>
        <button type="button" data-direction="callees" class="active" title="show transitive callees (BFS down)">↓ callees</button>
      </div>
      <div id="hierarchy-depth" class="btn-group" role="group" aria-label="depth">
        <span class="btn-group-label">depth</span>
        <button type="button" data-depth="3">3</button>
        <button type="button" data-depth="5" class="active">5</button>
        <button type="button" data-depth="7">7</button>
        <button type="button" data-depth="10">10</button>
      </div>
    </div>
    <input id="search" type="text" placeholder="search by name…" autocomplete="off">
    <span id="status" class="status"></span>
  </header>

  <main>
    <section id="cy" aria-label="call graph"></section>
    <aside id="sidebar" aria-label="chunk detail">
      <p class="hint">Click a node to see its source, callers, callees, and tests.</p>
    </aside>
  </main>

  <!-- 2D renderer (Cytoscape + dagre) -->
  <script src="/static/vendor/dagre.min.js"></script>
  <script src="/static/vendor/cytoscape.min.js"></script>
  <script src="/static/vendor/cytoscape-dagre.min.js"></script>

  <!-- 3D renderer (Three.js + 3d-force-graph) -->
  <script src="/static/vendor/three.min.js"></script>
  <script src="/static/vendor/3d-force-graph.min.js"></script>

  <!-- View modules -->
  <script src="/static/views/callgraph-2d.js"></script>
  <script src="/static/views/callgraph-3d.js"></script>
  <script src="/static/views/hierarchy-3d.js"></script>
  <script src="/static/views/cluster-3d.js"></script>

  <!-- Router (must load last; depends on all view modules being registered on window) -->
  <script src="/static/app.js"></script>
</body>
</html>
